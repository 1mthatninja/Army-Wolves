<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register</title>
<link rel="stylesheet" href="../css/tryregister.css">
</head>
<body>

<header class="navbar">
    <div class="nav-left">
        <div class="logo">MY GAME</div>

        <div class="nav-links">
            <a href="#">Register</a>
            <a href="#">Community</a>
            <a href="#">Help</a>
        </div>
    </div>

    <a href="#" class="play-btn">Play Now!</a>
</header>

<div class="register-container">

    <div class="avatar-panel">

        <div class="step-number">1</div>

        <div class="avatar-preview">
            <img src="https://placehold.co/280x350/png" alt="Avatar">
        </div>

        <div class="color-picker">
            <span class="color" style="background:#ff0000;"></span>
            <span class="color" style="background:#00ff00;"></span>
            <span class="color" style="background:#0000ff;"></span>
            <span class="color" style="background:#ffff00;"></span>
            <span class="color" style="background:#ff00ff;"></span>
            <span class="color" style="background:#00ffff;"></span>
            <span class="color" style="background:#ff8800;"></span>
            <span class="color" style="background:#222;"></span>
        </div>

        <div class="referral-box">
            <h3>Referral Code (Optional)</h3>

            <input
                type="text"
                placeholder="Referral Code"
            >
        </div>

    </div>

    <div class="form-panel">

        <div class="form-group">
            <div class="step-number">2</div>
            <h2>Create a Character Name</h2>

            <input
                type="text"
                placeholder="Character Name"
            >
        </div>

        <div class="form-group">
            <div class="step-number">3</div>
            <h2>Create a Password</h2>

            <input
                type="password"
                placeholder="Password"
            >
        </div>

        <div class="form-group">
            <div class="step-number">4</div>
            <h2>Email Address</h2>

            <input
                type="email"
                placeholder="Email Address"
            >
        </div>

        <div class="terms">
            <input type="checkbox">

            <label>
                I agree to the Terms & Conditions
            </label>
        </div>

        <div class="captcha-box">

            <h3>Pick the Popcorn</h3>

            <div class="choices">
                <button>🍕</button>
                <button>🍿</button>
                <button>🍉</button>
            </div>

        </div>

        <button class="create-btn">
            CREATE ACCOUNT
        </button>

    </div>

</div>

</body>
</html>
